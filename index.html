<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.jpg" type="image/jpeg" />
    <link rel="apple-touch-icon" href="/favicon.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Speed up third-party connections (analytics + embedded video) -->
    <link rel="preconnect" href="https://plausible.io" crossorigin />
    <link rel="preconnect" href="https://www.youtube-nocookie.com" />
    <link rel="preconnect" href="https://www.youtube.com" />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <meta name="theme-color" content="#0E0E0E" />
    <meta name="author" content="ØRIONS" />
    <!-- title · description · robots · canonical · Open Graph · Twitter are emitted
         per-route by the <SEO> component (vite-react-ssg <Head>) and prerendered into
         each page. Static copies here would duplicate (and go stale) on every URL. -->

    <!-- Plausible analytics (privacy-friendly, no cookie banner needed) -->
    <script defer data-domain="orions.agency" src="https://plausible.io/js/script.js"></script>
    <script>window.plausible=window.plausible||function(){(window.plausible.q=window.plausible.q||[]).push(arguments)}</script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ØRIONS",
      "url": "https://orions.agency",
      "logo": "https://orions.agency/favicon.jpg",
      "slogan": "Stories, refined.",
      "description": "ØRIONS is a Bangkok boutique creative agency that thinks like a consultancy — it diagnoses where a brand is stuck before doing any work, then fixes it with craft, end to end (Consult → Craft → Boutique). Services: brand strategy, creative production (brand film, video, photography, music) and communication design. The sharpest story wins, not the loudest. Marketing rents attention; creative earns belief. Deliberately limited client roster. Quoted per campaign/project.",
      "founder": {
        "@type": "Person",
        "name": "Ratthakan Suwanphakdee",
        "jobTitle": "Founder & Creative Director"
      },
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "246/8 Soi Yothinphatthana 3",
        "addressLocality": "Khlong Chan, Bang Kapi",
        "addressRegion": "Bangkok",
        "postalCode": "10240",
        "addressCountry": "TH"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+66-89-354-2628",
        "email": "hello@orions.agency",
        "contactType": "customer service",
        "availableLanguage": ["English", "Thai"]
      },
      "foundingDate": "2025",
      "taxID": "0105568220629",
      "areaServed": { "@type": "Country", "name": "Thailand" },
      "knowsAbout": [
        "Creative direction", "Brand strategy", "Brand identity",
        "Big idea campaigns", "Art direction", "Brand film",
        "Video production", "Music video production", "Photography", "Rebranding"
      ],
      "sameAs": [
        "https://www.instagram.com/orions.agency",
        "https://www.facebook.com/orions.agency",
        "https://line.me/ti/p/~orions"
      ]
    }
    </script>

    <!-- JSON-LD: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "ØRIONS — Boutique Creative Agency",
      "description": "Bangkok boutique creative agency that thinks like a consultancy — diagnoses where a brand is stuck before doing any work, then fixes it with craft, end to end. Brand strategy, creative production (brand film, video, photography, music) and communication design. Deliberately limited client roster. Quoted per campaign/project; no rate card.",
      "slogan": "Stories, refined.",
      "priceRange": "$$$",
      "image": "https://orions.agency/og.jpg",
      "url": "https://orions.agency",
      "telephone": "+66-89-354-2628",
      "email": "hello@orions.agency",
      "sameAs": [
        "https://www.instagram.com/orions.agency",
        "https://www.facebook.com/orions.agency",
        "https://line.me/ti/p/~orions"
      ],
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "246/8 Soi Yothinphatthana 3",
        "addressLocality": "Khlong Chan, Bang Kapi",
        "addressRegion": "Bangkok",
        "postalCode": "10240",
        "addressCountry": "TH"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 13.7823,
        "longitude": 100.6425
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],

      "knowsLanguage": ["Thai", "English"],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Creative Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Brand strategy", "url": "https://orions.agency/" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Creative production — brand film, video, photography, music", "url": "https://orions.agency/work" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Communication design", "url": "https://orions.agency/" } }
        ]
      }

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ØRIONS",
      "alternateName": "ØRIONS Boutique Creative Agency",
      "description": "Bangkok boutique creative agency that thinks like a consultancy — brand strategy, creative production and communication design. The sharpest story wins, not the loudest.",
      "url": "https://orions.agency",
      "inLanguage": "th-TH",
      "publisher": { "@type": "Organization", "name": "ØRIONS", "url": "https://orions.agency" }
    }
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
