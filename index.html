    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "ØRIONS ทำอะไร?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ØRIONS เป็นครีเอทีฟเอเจนซีในกรุงเทพฯ ที่รวม คิด–ทำ–ยิง ไว้ในระบบเดียว — Digital (ยอด) · Boutique (แบรนด์) · Production (ถ่าย). เราถามก่อนเสนอเสมอ: ยอด หรือ แบรนด์?"
          }
        },
        {
          "@type": "Question",
          "name": "เริ่มงานกับ ØRIONS ต้องทำอย่างไร?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "เริ่มจากคุยฟรี 45 นาที ไม่มีข้อผูกมัด — เล่าโจทย์และเงื่อนไขของแบรนด์มา เราช่วยมองว่าจะ refine มันยังไง ติดต่อได้ที่ hello@orions.agency หรือ 092 390 5464"
          }
        },
        {
          "@type": "Question",
          "name": "ØRIONS ทำงานเร็วแค่ไหน?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ทำงานเป็นทีมเดียวตั้งแต่กลยุทธ์ถึงการผลิต — จาก hello ขึ้นจริงได้ใน 4 สัปดาห์"
          }
        },
        {
          "@type": "Question",
          "name": "ØRIONS เชื่ออะไร?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "เราเชื่อว่างานที่ดีที่สุดมักเกิดขึ้นใต้ข้อจำกัด เราไม่หนีข้อจำกัด — เราถือว่ามันคือบรีฟ และ refine เรื่องที่จริงของแบรนด์จนคมพอจะลงในกรอบนั้นได้"
          }
        },
        {
          "@type": "Question",
          "name": "ØRIONS ไม่เหมาะกับใคร?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ถ้าคุณต้องการแค่ยอดให้เร็วที่สุดโดยไม่สนภาพจำระยะยาว หรืออยากได้คอนเทนต์เยอะที่สุดในราคาถูกที่สุดโดยไม่มีกลยุทธ์ เราจะบอกตรง ๆ ว่าเราอาจไม่ใช่คำตอบ"
          }
        }
      ]
